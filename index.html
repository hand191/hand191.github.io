<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的信息入口</title>
  <link rel="stylesheet" href="styles.css?v=20260613-10" />
</head>
<body>
  <main class="app">
    <section class="editor-panel">
      <div class="topbar">
        <div>
          <h1>我的信息入口</h1>
          <p>随手记录想法、学习过程和项目线索。</p>
        </div>
        <span id="saveStatus" class="status">已准备</span>
      </div>

      <div
        id="noteInput"
        class="note-input"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        data-placeholder="在这里直接输入，或粘贴截图..."
      ></div>

      <div class="meta">
        <span id="lastSaved">尚未保存</span>
        <button id="archiveButton" class="archive-button" type="button">归档当前内容</button>
      </div>

      <div id="replyBanner" class="reply-banner" hidden>
        <span id="replyTargetText"></span>
        <button id="cancelReplyButton" type="button">取消回复</button>
      </div>
    </section>

    <section class="records-panel">
      <div class="section-heading">
        <h2>最近记录</h2>
        <span id="recordCount">0 条</span>
      </div>
      <div id="recordsList" class="records-list"></div>
    </section>
  </main>

  <script type="module" src="src/app.js?v=20260613-9"></script>
</body>
</html>
