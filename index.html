<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭信息</title>
  <link rel="stylesheet" href="styles.css?v=20260619-1" />
</head>
<body>
  <section id="accessGate" class="access-gate">
    <form id="accessForm" class="access-card">
      <h1>家庭信息</h1>
      <p>请输入家庭入口码。</p>
      <input
        id="accessCodeInput"
        class="access-input"
        type="password"
        inputmode="text"
        autocomplete="current-password"
        placeholder="入口码"
      />
      <button class="archive-button" type="submit">进入</button>
      <span id="accessError" class="access-error" hidden>入口码不对</span>
    </form>
  </section>

  <main id="familyApp" class="app" hidden>
    <section class="editor-panel">
      <div class="topbar">
        <div>
          <div class="title-row">
            <h1>家庭信息</h1>
            <a class="drop-entry-link" href="drop/">共享入口</a>
          </div>
          <p>随手记录想法、学习过程和项目线索。</p>
        </div>
        <div class="role-switch" aria-label="当前记录用户">
          <button class="role-button" type="button" data-author-id="yingjun">英俊</button>
          <button class="role-button" type="button" data-author-id="hongxia">红霞</button>
        </div>
        <div class="topbar-actions">
          <button id="themeButton" class="reload-button" type="button" aria-label="切换夜间模式">夜间</button>
          <button id="reloadButton" class="reload-button" type="button">重拉</button>
          <span id="saveStatus" class="status">已准备</span>
        </div>
      </div>

      <div
        id="noteInput"
        class="note-input"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        data-placeholder="在这里直接输入，或粘贴截图..."
      ></div>

      <div class="meta">
        <span id="lastSaved">尚未保存</span>
        <button id="archiveButton" class="archive-button" type="button">归档当前内容</button>
      </div>

      <div id="replyBanner" class="reply-banner" hidden>
        <span id="replyTargetText"></span>
        <button id="cancelReplyButton" type="button">取消回复</button>
      </div>
    </section>

    <section class="records-panel">
      <div class="section-heading">
        <h2>最近记录</h2>
        <span id="recordCount">0 条</span>
      </div>
      <div id="recordsList" class="records-list"></div>
    </section>
  </main>

  <script type="module" src="src/theme.js?v=20260619-1"></script>
  <script type="module" src="src/app.js?v=20260618-7"></script>
</body>
</html>
