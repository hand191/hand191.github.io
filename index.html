<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的信息入口</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="editor-panel">
      <div class="topbar">
        <div>
          <h1>我的信息入口</h1>
          <p>随手记录想法、学习过程和项目线索。</p>
        </div>
        <span id="saveStatus" class="status">已准备</span>
      </div>

      <textarea
        id="noteInput"
        class="note-input"
        placeholder="在这里直接输入，不需要点击保存..."
      ></textarea>

      <div class="meta">
        <span id="lastSaved">尚未保存</span>
      </div>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
